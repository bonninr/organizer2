<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organ Console Scene Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0a0a0f;
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }
        #container {
            width: 100%;
            height: 100%;
            position: relative;
        }
        #loadPanel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 100;
        }
        #loadPanel.hidden { display: none; }
        #loadBtn {
            padding: 16px 32px;
            font-size: 1.1em;
            background: #4a7c59;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        #loadBtn:hover { background: #5a9c69; }
        #fileInput { display: none; }
        #info {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 0.85em;
        }
        #info.hidden { display: none; }

        .glow-text {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Outfit', system-ui, sans-serif;
            text-align: center;
            pointer-events: none;
            z-index: 50;
            text-transform: uppercase;
        }
        .glow-text.hidden { opacity: 0; transition: opacity 1s ease-out; }
        .glow-text.visible { opacity: 1; transition: opacity 1s ease-out; }

        #upperText {
            top: 8%;
            font-size: clamp(1.8rem, 5vw, 4rem);
            font-weight: 300;
            color: #888888;
            text-shadow:
                0 0 10px rgba(255, 255, 255, 0.4),
                0 0 25px rgba(255, 255, 255, 0.2),
                0 0 50px rgba(200, 200, 200, 0.15);
            letter-spacing: 0.6em;
        }

        #lowerText {
            bottom: 8%;
            font-size: clamp(0.9rem, 2.5vw, 1.8rem);
            font-weight: 200;
            color: #777777;
            text-shadow:
                0 0 8px rgba(255, 255, 255, 0.35),
                0 0 20px rgba(255, 255, 255, 0.15),
                0 0 40px rgba(180, 180, 180, 0.1);
            letter-spacing: 0.5em;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="upperText" class="glow-text hidden">Full Stack</div>
        <div id="lowerText" class="glow-text hidden">Virtual Pipe Organ</div>

        <div id="loadPanel">
            <p style="margin-bottom: 16px; opacity: 0.7;">Load an exported organ console scene</p>
            <button id="loadBtn">Load Scene JSON</button>
            <input type="file" id="fileInput" accept=".json">
        </div>
        <div id="info" class="hidden">
            <strong>Controls:</strong> Drag to rotate | Right-click to pan | Scroll to zoom
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script>
        const container = document.getElementById('container');
        const loadPanel = document.getElementById('loadPanel');
        const loadBtn = document.getElementById('loadBtn');
        const fileInput = document.getElementById('fileInput');
        const info = document.getElementById('info');

        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x08080c);
        scene.fog = new THREE.FogExp2(0x08080c, 0.04);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(-5, 5, -5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        renderer.outputEncoding = THREE.sRGBEncoding;
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 2.5;

        // Post-processing with bloom for glow effect
        const composer = new THREE.EffectComposer(renderer);
        const renderPass = new THREE.RenderPass(scene, camera);
        composer.addPass(renderPass);

        // Bloom pass for glow effect on model and particles
        const bloomPass = new THREE.UnrealBloomPass(
            new THREE.Vector2(window.innerWidth, window.innerHeight),
            0.8,    // strength
            0.6,    // radius
            0.15    // threshold - lower = more glow
        );
        composer.addPass(bloomPass);

        // Motion blur shader
        const motionBlurShader = {
            uniforms: {
                'tDiffuse': { value: null },
                'tOld': { value: null },
                'blendFactor': { value: 0.8 }
            },
            vertexShader: `
                varying vec2 vUv;
                void main() {
                    vUv = uv;
                    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                }
            `,
            fragmentShader: `
                uniform sampler2D tDiffuse;
                uniform sampler2D tOld;
                uniform float blendFactor;
                varying vec2 vUv;
                void main() {
                    vec4 newFrame = texture2D(tDiffuse, vUv);
                    vec4 oldFrame = texture2D(tOld, vUv);
                    gl_FragColor = mix(newFrame, oldFrame, blendFactor);
                }
            `
        };

        const motionBlurPass = new THREE.ShaderPass(motionBlurShader);
        composer.addPass(motionBlurPass);

        // Create render targets for motion blur accumulation
        const rtOld = new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight);
        const rtNew = new THREE.WebGLRenderTarget(window.innerWidth, window.innerHeight);

        // 2D Glowing text elements
        const upperText = document.getElementById('upperText');
        const lowerText = document.getElementById('lowerText');

        // Simple floating particles with varying sizes
        const particleCount = 200;
        const particleGeometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const sizes = new Float32Array(particleCount);
        const velocities = [];

        for (let i = 0; i < particleCount; i++) {
            const radius = 8 + Math.random() * 25;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.random() * Math.PI;

            positions[i * 3] = radius * Math.sin(phi) * Math.cos(theta);
            positions[i * 3 + 1] = radius * Math.cos(phi);
            positions[i * 3 + 2] = radius * Math.sin(phi) * Math.sin(theta);

            // Varying sizes - some small, some large
            sizes[i] = 0.5 + Math.random() * 2.5;

            velocities.push({
                x: (Math.random() - 0.5) * 0.006,
                y: (Math.random() - 0.5) * 0.004 - 0.001,
                z: (Math.random() - 0.5) * 0.006
            });
        }

        particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        particleGeometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

        // Soft circles with varying diameters
        const particleMaterial = new THREE.ShaderMaterial({
            uniforms: {},
            vertexShader: `
                attribute float size;
                varying float vSize;
                void main() {
                    vSize = size;
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    gl_PointSize = size * (250.0 / -mvPosition.z);
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                void main() {
                    vec2 center = gl_PointCoord - vec2(0.5);
                    float dist = length(center);
                    // Soft circle edge
                    float alpha = smoothstep(0.5, 0.3, dist) * 0.3;
                    vec3 color = vec3(0.75, 0.75, 0.8);
                    gl_FragColor = vec4(color, alpha);
                }
            `,
            transparent: true,
            depthWrite: false,
            blending: THREE.AdditiveBlending
        });

        const particles = new THREE.Points(particleGeometry, particleMaterial);
        scene.add(particles);

        // Add subtle ambient light for particles
        const ambientLight = new THREE.AmbientLight(0x404050, 0.3);
        scene.add(ambientLight);

        // Load button click
        loadBtn.addEventListener('click', () => fileInput.click());

        // File selected
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const data = JSON.parse(event.target.result);
                    loadScene(data);
                    loadPanel.classList.add('hidden');
                    info.classList.remove('hidden');
                    // Show glowing text
                    upperText.classList.remove('hidden');
                    upperText.classList.add('visible');
                    lowerText.classList.remove('hidden');
                    lowerText.classList.add('visible');
                } catch (err) {
                    alert('Failed to parse JSON: ' + err.message);
                }
            };
            reader.readAsText(file);
        });

        let loadedModel = null;

        function loadScene(data) {
            // Clear existing scene objects (keep particles and lights)
            const toRemove = [];
            scene.traverse((obj) => {
                if (obj !== scene && obj !== particles && obj !== ambientLight && !obj.isLight) {
                    if (obj.parent === scene) toRemove.push(obj);
                }
            });
            toRemove.forEach(obj => scene.remove(obj));

            // Load scene using ObjectLoader
            const loader = new THREE.ObjectLoader();
            const loadedScene = loader.parse(data.scene);

            // Create a group to hold the model for rotation
            loadedModel = new THREE.Group();

            // Add children from loaded scene, excluding floor
            const childrenToAdd = [...loadedScene.children];
            childrenToAdd.forEach(child => {
                // Skip floor (usually a large plane)
                const isFloor = (child.geometry && child.geometry.type === 'PlaneGeometry') ||
                               (child.name && child.name.toLowerCase().includes('floor'));

                if (!isFloor) {
                    loadedModel.add(child);
                }
            });

            scene.add(loadedModel);

            // Apply material overrides (fixes MeshPhysicalMaterial serialization issues)
            if (data.materialOverrides && Array.isArray(data.materialOverrides)) {
                const textureLoader = new THREE.TextureLoader();
                let meshIndex = 0;

                // Traverse the original loaded scene to match indices
                const allMeshes = [];
                loadedModel.traverse((obj) => {
                    if (obj.isMesh) allMeshes.push(obj);
                });

                // Also check original scene for floor mesh count
                let floorMeshCount = 0;
                loadedScene.traverse((obj) => {
                    if (obj.isMesh) {
                        const isFloor = (obj.geometry && obj.geometry.type === 'PlaneGeometry') ||
                                       (obj.name && obj.name.toLowerCase().includes('floor'));
                        if (isFloor) floorMeshCount++;
                    }
                });

                data.materialOverrides.forEach((override, index) => {
                    // Skip floor overrides
                    if (override.name && override.name.toLowerCase().includes('floor')) return;

                    const mesh = allMeshes[meshIndex];
                    if (!mesh) return;
                    meshIndex++;

                    // Create new MeshPhysicalMaterial with proper properties and glow
                    const baseColor = override.color ? new THREE.Color(override.color) : new THREE.Color(0xA0722A);

                    const newMat = new THREE.MeshPhysicalMaterial({
                        color: baseColor,
                        metalness: override.metalness ?? 0,
                        roughness: override.roughness ?? 0.3,
                        clearcoat: override.clearcoat ?? 0.8,
                        clearcoatRoughness: override.clearcoatRoughness ?? 0.1,
                        reflectivity: override.reflectivity ?? 0.5,
                        envMapIntensity: override.envMapIntensity ?? 1,
                        // Add subtle glow
                        emissive: baseColor.clone().multiplyScalar(0.1),
                        emissiveIntensity: 0.4
                    });

                    // Load embedded texture if available
                    if (override.texture) {
                        const tex = textureLoader.load(override.texture);
                        tex.wrapS = THREE.RepeatWrapping;
                        tex.wrapT = THREE.RepeatWrapping;
                        newMat.map = tex;
                        newMat.color.set(0xffffff);
                        newMat.emissive.set(0x332211); // Warm subtle glow for textured
                        newMat.needsUpdate = true;
                    }

                    // Handle emissive materials (light bulbs) - stronger glow
                    if (override.emissive && override.emissive !== '#000000') {
                        newMat.emissive = new THREE.Color(override.emissive);
                        newMat.emissiveIntensity = (override.emissiveIntensity ?? 1) * 1.5;
                    }

                    mesh.material = newMat;
                });
            }

            // Center the model
            const box = new THREE.Box3().setFromObject(loadedModel);
            const center = box.getCenter(new THREE.Vector3());
            loadedModel.position.sub(center);
            loadedModel.position.y += box.getSize(new THREE.Vector3()).y / 2;

            // Apply camera settings if provided
            if (data.camera) {
                if (data.camera.position) {
                    camera.position.fromArray(data.camera.position);
                }
                if (data.camera.target) {
                    controls.target.fromArray(data.camera.target);
                }
                if (data.camera.fov) {
                    camera.fov = data.camera.fov;
                    camera.updateProjectionMatrix();
                }
            }

            // Center on model - target higher to push model down on screen
            controls.target.set(0, 1.5, 0);
            camera.position.set(-6, 3, -6);
            controls.update();

            console.log('Scene loaded successfully!', scene);
        }

        // Animation variables
        let previousFrame = null;
        const clock = new THREE.Clock();

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();
            const time = clock.getElapsedTime();

            // Update controls
            controls.update();

            // Animate particles - gentle drift
            const positions = particleGeometry.attributes.position.array;
            for (let i = 0; i < particleCount; i++) {
                positions[i * 3] += velocities[i].x;
                positions[i * 3 + 1] += velocities[i].y;
                positions[i * 3 + 2] += velocities[i].z;

                // Reset particles that drift too far
                const dist = Math.sqrt(
                    positions[i * 3] ** 2 +
                    positions[i * 3 + 1] ** 2 +
                    positions[i * 3 + 2] ** 2
                );
                if (dist > 35 || positions[i * 3 + 1] < -15) {
                    const radius = 10 + Math.random() * 15;
                    const theta = Math.random() * Math.PI * 2;
                    positions[i * 3] = radius * Math.cos(theta);
                    positions[i * 3 + 1] = 10 + Math.random() * 10;
                    positions[i * 3 + 2] = radius * Math.sin(theta);
                }
            }
            particleGeometry.attributes.position.needsUpdate = true;

            // Slow particle rotation
            particles.rotation.y += 0.0003;

            // Render with motion blur
            // First render current frame
            renderer.setRenderTarget(rtNew);
            renderer.render(scene, camera);

            // Blend with previous frame
            if (previousFrame) {
                motionBlurPass.uniforms.tOld.value = previousFrame;
            } else {
                motionBlurPass.uniforms.tOld.value = rtNew.texture;
            }

            // Render final composited frame
            renderer.setRenderTarget(null);
            composer.render();

            // Swap buffers
            const temp = previousFrame;
            previousFrame = rtNew.texture;
        }
        animate();

        // Handle resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
            bloomPass.setSize(window.innerWidth, window.innerHeight);
            rtOld.setSize(window.innerWidth, window.innerHeight);
            rtNew.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
